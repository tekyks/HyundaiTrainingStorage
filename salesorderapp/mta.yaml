_schema-version: 3.3.0
ID: salesorderapp
version: 1.0.0-SNAPSHOT
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
modules:
  - name: salesorderapp-srv
    type: java
    path: srv
    parameters:
      instances: 1
      buildpack: sap_java_buildpack_jakarta
    properties:
      SPRING_PROFILES_ACTIVE: cloud,sandbox
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jre.SAPMachineJRE']"
      JBP_CONFIG_SAP_MACHINE_JRE: '{ version: 21.+ }'
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests=true --batch-mode
      build-result: target/*-exec.jar
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: salesorderapp-auth
      - name: salesorderapp-db
      - name: salesorderapp-destination

  - name: salesorderapp-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands:
        - npm run build
    requires:
      - name: salesorderapp-db

  - name: salesorderapp-app-deployer
    type: com.sap.application.content
    path: .
    build-parameters:
      build-result: resources
      requires:
        - name: salesorderappsalesorderui
          artifacts:
            - salesorderui.zip
          target-path: resources
    requires:
      - name: salesorderapp-auth
      - name: srv-api
      - name: salesorderapp-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: salesorderappsalesorderui
    type: html5
    path: app/salesorderui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms:
        []

  - name: salesorderapp-destinations
    type: com.sap.application.content
    requires:
      - name: salesorderapp-auth
        parameters:
          service-key:
            name: salesorderapp-auth-key
      - name: salesorderapp-html5-repo-host
        parameters:
          service-key:
            name: salesorderapp-html5-repo-host-key
      - name: srv-api
      - name: salesorderapp-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: salesorderapp-html5-repository
              ServiceInstanceName: salesorderapp-html5-repo-host
              ServiceKeyName: salesorderapp-html5-repo-host-key
              sap.cloud.service: salesorderapp.service
            - Name: salesorderapp-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: salesorderapp-auth
              ServiceKeyName: salesorderapp-auth-key
              sap.cloud.service: salesorderapp.service

resources:
  - name: salesorderapp-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: salesorderapp-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
  - name: salesorderapp-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: salesorderapp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true

    requires:
      - name: srv-api

  - name: salesorderapp-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
